workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic

    environment:
      vars:
        BASE44_APP_ID: "69c61dda06ecec47f8753dd9"
        BASE44_API_KEY: "cbd0d0ccb86f475d8b3bd5acb118f50f"
        BUNDLE_ID: "app.emergent.legal-counsel-qae63810fe"
        TEAM_ID: "ZB2DTF72H5"
        APP_STORE_CONNECT_ISSUER_ID: "2fd85088-1cc1-4b3c-9f0b-bdd07fee90d5"
        APP_STORE_CONNECT_KEY_IDENTIFIER: "9SR2A58N38"
        APP_STORE_CONNECT_PRIVATE_KEY: |-
          -----BEGIN PRIVATE KEY-----
          MIGTAgEAMBMGByqGSM49AgEGCCqGSM49AwEHBHkwdwIBAQQg2pA2nU0A6ML0CgiU
          7yzOqNw+itVezwJBu6brKvMhSz+gCgYIKoZIzj0DAQehRANCAAQ89HXPubbc6Jre
          e7dkMBmHk3Z9sDaUnOfXoHhvfHwZTno7J+vV2UL2BpQRq2X6QYmsemcth710hqFh
          alJ6LX+c
          -----END PRIVATE KEY-----
      node: 24

    scripts:
      - name: Install dependencies
        script: npm install --include=dev

      - name: Build web assets
        script: |
          VITE_BASE44_APP_ID=$BASE44_APP_ID VITE_BASE44_API_KEY=$BASE44_API_KEY npx vite build

      - name: Sync Capacitor
        script: npx capacitor sync ios

      - name: Configure Project Identity and BUMP VERSION
        script: |
          cd ios/App
          # Update Project Identity
          sed -i '' "s/PRODUCT_BUNDLE_IDENTIFIER = [^;]*;/PRODUCT_BUNDLE_IDENTIFIER = $BUNDLE_ID;/g" App.xcodeproj/project.pbxproj
          sed -i '' "s/DEVELOPMENT_TEAM = [^;]*;/DEVELOPMENT_TEAM = $TEAM_ID;/g" App.xcodeproj/project.pbxproj
          sed -i '' "s/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g" App.xcodeproj/project.pbxproj
          # BUMP VERSION to resolve Redundant Binary Upload error
          agvtool new-version -all 700
          agvtool new-marketing-version 1.7.0

      - name: Build and Sign
        script: |
          keychain initialize
          openssl genrsa -out cert_key.pem 2048
          export CERTIFICATE_PRIVATE_KEY=$(cat cert_key.pem)
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles --project ios/App/App.xcodeproj
          xcode-project build-ipa --project ios/App/App.xcodeproj --scheme App

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false