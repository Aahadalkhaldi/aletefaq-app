workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic

    environment:
      groups:
        - app_secrets
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.emergent.legal-counsel-qae63810fe
      vars:
        VITE_BASE44_APP_ID: app.emergent.legal-counsel-qae63810fe
        VITE_BASE44_APP_BASE_URL: https://aletefaq-f8753dd9.base44.app
      node: 24

    scripts:
      - name: Install dependencies
        script: npm install --include=dev

      - name: Build web assets
        script: npx vite build

      - name: Sync Capacitor
        script: npx @capacitor/cli sync ios

      - name: Set build version
        script: |
          cd ios/App
          agvtool new-version -all 15000
          agvtool new-marketing-version 15.0.0

      - name: Build iOS
        script: |
          cd ios/App
          xcodebuild -project App.xcodeproj -scheme App -configuration Release -sdk iphoneos -archivePath build/App.xcarchive archive CODE_SIGN_STYLE=Manual

      - name: Export IPA
        script: |
          cd ios/App
          xcode-project build-ipa --project App.xcodeproj --scheme App

    artifacts:
      - ios/App/build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
