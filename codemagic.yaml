workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic

    environment:
      vars:
        BUNDLE_ID: "app.emergent.legal-counsel-qae63810fe"
        TEAM_ID: "ZB2DTF72H5"
        APP_STORE_CONNECT_ISSUER_ID: "2fd85088-1cc1-4b3c-9f0b-bdd07fee90d5"
        APP_STORE_CONNECT_KEY_IDENTIFIER: "9SR2A58N38"
        APP_STORE_CONNECT_PRIVATE_KEY: |-
          -----BEGIN PRIVATE KEY-----
          MIGTAgEAMBMGByqGSM49AgEGCCqGSM49AwEHBHkwdwIBAQQg2pA2nU0A6ML0CgiU
          7yzOqNw+itVezwJBu6brKvMhSz+gCgYIKoZIzj0DAQehRANCAAQ89HXPubbc6Jre
          e7dkMBmHk3Z9sDaUnOfXoHhvfHwZTno7J+vV2UL2BpQRq2X6QYmsemcth710hqFh
          alJ6LX+c
          -----END PRIVATE KEY-----
      node: 24

    scripts:
      - name: Install dependencies
        script: npm install --include=dev

      - name: Build web assets
        script: npx vite build

      - name: Sync Capacitor
        script: npx capacitor sync ios

      - name: Setup Signing and Build
        script: |
          # 1. Initialize Keychain
          keychain initialize
          
          # 2. Generate a temporary RSA key for certificate creation (The missing piece)
          openssl genrsa -out cert_key.pem 2048
          export CERTIFICATE_PRIVATE_KEY=$(cat cert_key.pem)
          
          # 3. Create Bundle ID if missing
          app-store-connect bundle-ids create --bundle-id "$BUNDLE_ID" --name "Aletefaq App" || true
          
          # 4. Fetch or Create Signing Files
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          
          # 5. Add certificates and use profiles
          keychain add-certificates
          xcode-project use-profiles --project ios/App/App.xcodeproj
          
          # 6. Build IPA (Without invalid export-method flag)
          xcode-project build-ipa --project ios/App/App.xcodeproj --scheme App

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
