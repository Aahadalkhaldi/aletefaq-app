workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: qa.alittifaq.app
      vars:
        VITE_BASE44_APP_ID: f8753dd9
        VITE_BASE44_APP_BASE_URL: https://aletefaq-f8753dd9.base44.app
      node: 22
    scripts:
      - name: Install dependencies
        script: |
          npm install --include=dev
      - name: Build web assets
        script: |
          npx vite build
      - name: Sync Capacitor
        script: |
          npx @capacitor/cli sync ios
      - name: Setup iOS signing
        script: |
          xcode-project use-profiles
      - name: Build iOS
        script: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            -archivePath build/App.xcarchive \
            archive
      - name: Export IPA
        script: |
          cd ios/App
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportOptionsPlist /tmp/export_options.plist \
            -exportPath build/export
    artifacts:
      - ios/App/build/export/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
