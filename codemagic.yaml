workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic

    environment:
      groups:
        - app_secrets
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.emergent.legal-counsel-qae63810fe
      vars:
        VITE_BASE44_APP_ID: app.emergent.legal-counsel-qae63810fe
        VITE_BASE44_APP_BASE_URL: https://aletefaq-f8753dd9.base44.app
      node: 24

    scripts:
      - name: Validate required environment variables
        script: |
          test -n "$VITE_SUPABASE_URL" || { echo "Missing VITE_SUPABASE_URL"; exit 1; }
          test -n "$VITE_SUPABASE_ANON_KEY" || { echo "Missing VITE_SUPABASE_ANON_KEY"; exit 1; }

      - name: Install dependencies
        script: |
          npm install --include=dev

      - name: Build web assets
        script: |
          npx vite build

      - name: Sync Capacitor
        script: |
          npx @capacitor/cli sync ios

      - name: Setup iOS signing
        script: |
          app-store-connect fetch-signing-files "app.emergent.legal-counsel-qae63810fe" \
            --type IOS_APP_STORE \
            --create
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles

      - name: Set build number
        script: |
          cd ios/App
          agvtool new-version -all 5000
          agvtool new-marketing-version 5.0.0

      - name: Build iOS
        script: |
          cd ios/App
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            -archivePath build/App.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual

      - name: Export IPA
        script: |
          cd ios/App
          xcode-project build-ipa \
            --project App.xcodeproj \
            --scheme App

    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - ios/App/build/App.xcarchive

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
