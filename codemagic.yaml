workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic

    environment:
      vars:
        BUNDLE_ID: "app.emergent.legal-counsel-qae63810fe"
        TEAM_ID: "ZB2DTF72H5"
        APP_STORE_CONNECT_ISSUER_ID: "2fd85088-1cc1-4b3c-9f0b-bdd07fee90d5"
        APP_STORE_CONNECT_KEY_IDENTIFIER: "9SR2A58N38"
        APP_STORE_CONNECT_PRIVATE_KEY: |-
          -----BEGIN PRIVATE KEY-----
          MIGTAgEAMBMGByqGSM49AgEGCCqGSM49AwEHBHkwdwIBAQQg2pA2nU0A6ML0CgiU
          7yzOqNw+itVezwJBu6brKvMhSz+gCgYIKoZIzj0DAQehRANCAAQ89HXPubbc6Jre
          e7dkMBmHk3Z9sDaUnOfXoHhvfHwZTno7J+vV2UL2BpQRq2X6QYmsemcth710hqFh
          alJ6LX+c
          -----END PRIVATE KEY-----
      node: 24

    scripts:
      - name: Install dependencies
        script: npm install --include=dev

      - name: Build web assets
        script: npx vite build

      - name: Sync Capacitor
        script: npx capacitor sync ios

      - name: Configure Project Identity
        script: |
          cd ios/App
          # Force update Bundle ID and Team ID in pbxproj
          sed -i '' "s/PRODUCT_BUNDLE_IDENTIFIER = [^;]*;/PRODUCT_BUNDLE_IDENTIFIER = $BUNDLE_ID;/g" App.xcodeproj/project.pbxproj
          # Disable Automatic Signing and force Manual
          sed -i '' "s/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g" App.xcodeproj/project.pbxproj
          # Inject Team ID if missing
          if ! grep -q "DEVELOPMENT_TEAM" App.xcodeproj/project.pbxproj; then
            sed -i '' "s/PRODUCT_BUNDLE_IDENTIFIER = $BUNDLE_ID;/PRODUCT_BUNDLE_IDENTIFIER = $BUNDLE_ID;\n\t\t\t\tDEVELOPMENT_TEAM = $TEAM_ID;/g" App.xcodeproj/project.pbxproj
          fi

      - name: Build and Sign
        script: |
          keychain initialize
          # Use correctly formatted fetch command
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          keychain add-certificates
          # Use profiles for the build
          xcode-project use-profiles
          # Simple build-ipa command that works with standard settings
          xcode-project build-ipa --project "ios/App/App.xcodeproj" --scheme "App"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
