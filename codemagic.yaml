workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic

    environment:
      groups:
        - app_secrets
      vars:
        BUNDLE_ID: "app.emergent.legal-counsel-qae63810fe"
      node: 24

    scripts:
      - name: Install dependencies
        script: npm install --include=dev

      - name: Build web assets
        script: npx vite build

      - name: Sync Capacitor
        script: npx @capacitor/cli sync ios

      - name: Set build version
        script: |
          cd ios/App
          agvtool new-version -all 35000
          agvtool new-marketing-version 35.0.0

      - name: Build and Export IPA
        script: |
          # Force automatic code signing by Codemagic
          xcode-project build-ipa --project "ios/App/App.xcodeproj" --scheme "App"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
